<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FieldIQ Pro — WC 2026 Intelligence Platform</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/src/style.css">
</head>
<body>
  <div id="app">
    <!-- Top navigation bar -->
    <nav class="topbar">
      <div class="logo">FIELD<span class="accent">IQ</span> <span class="logo-sub">PRO · WC 2026</span></div>
      <div class="status-pill" id="api-status">
        <span class="dot"></span> connecting...
      </div>
      <div class="nav-tabs" id="nav-tabs">
        <button class="tab active" data-tab="simulate">Simulate</button>
        <button class="tab" data-tab="roster">Roster</button>
        <button class="tab" data-tab="pdv">PDV</button>
        <button class="tab" data-tab="srr">SRR</button>
        <button class="tab" data-tab="intelligence">Intelligence</button>
        <button class="tab" data-tab="model">Model</button>
        <button class="tab" data-tab="pipeline">Pipeline</button>
        <button class="tab" data-tab="blueprint">Blueprint</button>
        <button class="tab" data-tab="api">API</button>
      </div>
    </nav>

    <!-- Tab panels -->
    <main class="content" id="main-content">
      <!-- Panels injected by JS -->
    </main>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
