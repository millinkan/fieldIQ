substitutions:
  _REGION: europe-west1
  _PROJECT: fieldiq-498301
  _REPO: fieldiq
  _SERVICE: fieldiq-api

steps:
  - name: 'gcr.io/cloud-builders/docker'
    id: build
    args:
      - build
      - '-t'
      - '${_REGION}-docker.pkg.dev/${_PROJECT}/${_REPO}/app:latest'
      - '-f'
      - 'backend/Dockerfile'
      - '.'
    waitFor: ['-']

  - name: 'gcr.io/cloud-builders/docker'
    id: push
    args:
      - push
      - '${_REGION}-docker.pkg.dev/${_PROJECT}/${_REPO}/app:latest'
    waitFor: ['build']

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: deploy
    entrypoint: gcloud
    args:
      - run
      - deploy
      - '${_SERVICE}'
      - '--image=${_REGION}-docker.pkg.dev/${_PROJECT}/${_REPO}/app:latest'
      - '--region=${_REGION}'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--port=8080'
      - '--memory=4Gi'
      - '--cpu=2'
      - '--timeout=3600'
      - '--concurrency=4'
      - '--max-instances=3'
      - '--set-env-vars=PYTHONUNBUFFERED=1,LIVE_DATA_PROVIDER=mock,SERVE_FRONTEND=true'
    waitFor: ['push']

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: allow-unauthenticated
    entrypoint: gcloud
    args:
      - beta
      - run
      - services
      - add-iam-policy-binding
      - '${_SERVICE}'
      - '--region=${_REGION}'
      - '--member=allUsers'
      - '--role=roles/run.invoker'
    waitFor: ['deploy']

options:
  machineType: 'E2_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY

timeout: '1800s'
