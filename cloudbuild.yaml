# FieldIQ — GCP Cloud Build: test → push → Cloud Run staging
# Run: gcloud builds submit --config=cloudbuild.yaml .
# Image tag uses BUILD_ID (always set). SHORT_SHA is empty for local submit.
# Docs: docs/GCP-STAGING.md

substitutions:
  _REGION: europe-west1
  _REPOSITORY: fieldiq
  _SERVICE: fieldiq-staging
  _AR_HOST: europe-west1-docker.pkg.dev
  # Cost-safe defaults (override only if sims OOM — then set _MEMORY=4Gi)
  _MEMORY: 4Gi
  _CPU: "1"
  _MAX_INSTANCES: "1"

timeout: 2400s

options:
  # Docker build needs RAM for PyTorch bootstrap + image layers
  machineType: E2_HIGHCPU_8
  diskSizeGb: 100
  logging: CLOUD_LOGGING_ONLY

steps:
  # ── 1. Build backend (Google Deep Learning Container + PyTorch) ──────────
  - id: build-api
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -f
      - backend/Dockerfile
      - -t
      - ${_AR_HOST}/${PROJECT_ID}/${_REPOSITORY}/api:${BUILD_ID}
      - -t
      - ${_AR_HOST}/${PROJECT_ID}/${_REPOSITORY}/api:latest
      - .

  # ── 2. Pytest inside the image (mock model — fast, no GPU) ───────────────
  - id: test-api
    name: ${_AR_HOST}/${PROJECT_ID}/${_REPOSITORY}/api:${BUILD_ID}
    entrypoint: bash
    args:
      - -c
      - |
        set -e
        export SKIP_MODEL_INIT=1
        export ENFORCE_API_KEY=false
        export ENFORCE_RATE_LIMIT=false
        export ENFORCE_CREDITS=false
        export LOG_LEVEL=WARNING
        cd /app && pytest tests/ -q --tb=short
    waitFor: [build-api]

  # ── 3. Push to Artifact Registry ─────────────────────────────────────────
  - id: push-api
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - ${_AR_HOST}/${PROJECT_ID}/${_REPOSITORY}/api
    waitFor: [test-api]

  # ── 4. Deploy staging API to Cloud Run (scales to zero) ──────────────────
  - id: deploy-staging
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE}
      - --image=${_AR_HOST}/${PROJECT_ID}/${_REPOSITORY}/api:${BUILD_ID}
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated
      - --port=8080
      - --memory=${_MEMORY}
      - --cpu=${_CPU}
      - --timeout=300
      - --min-instances=0
      - --max-instances=${_MAX_INSTANCES}
      - --cpu-throttling
      - --set-env-vars=LOG_LEVEL=INFO,ENFORCE_CREDITS=false,ENFORCE_API_KEY=false,ENFORCE_RATE_LIMIT=false,LIVE_DATA_PROVIDER=mock,CORS_ORIGINS=*,MC_SIMULATIONS=1000,WEB_CONCURRENCY=1,SERVE_FRONTEND=true,MODEL_PATH=/app/data/models/match_mlp.pt,SCALER_PATH=/app/data/models/scaler.joblib
    waitFor: [push-api]

images:
  - ${_AR_HOST}/${PROJECT_ID}/${_REPOSITORY}/api:${BUILD_ID}
  - ${_AR_HOST}/${PROJECT_ID}/${_REPOSITORY}/api:latest
